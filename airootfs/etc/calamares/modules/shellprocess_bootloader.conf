---
# This name shows up in the progress bar
i18n:
    name: "Configuring selected bootloader..."

# Ensure we run inside the installed system
dontChroot: false
timeout: 300

script:
    # --- GRUB LOGIC ---
    - command: "grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=Arch && grub-mkconfig -o /boot/grub/grub.cfg"
      chroot: true
      condition: "global.packagechooser_bootloader_selection == 'grub'"

    # --- SYSTEMD-BOOT LOGIC ---
    - command: "bootctl install"
      chroot: true
      condition: "global.packagechooser_bootloader_selection == 'systemd-boot'"

    # --- REFIND LOGIC ---
    - command: "refind-install --yes"
      chroot: true
      condition: "global.packagechooser_bootloader_selection == 'refind'"
