---
id:         bootloader_selection
name:       "Choose your Bootloader"
description: "Select how your system starts up. GRUB is best for dual-booting; systemd-boot is fastest for modern UEFI."
method:     radio  # Changed from radio to packages to ensure data passes correctly
default:    grub

items:
  - id: grub
    name: "GRUB"
    description: "The classic, highly compatible bootloader. Supports BIOS and UEFI."
    packages: [grub, efibootmgr, os-prober, mtools]

  - id: systemd-boot
    name: "systemd-boot"
    description: "Lightweight and modern. Faster boot times (UEFI only)."
    packages: [systemd, efibootmgr]

  - id: refind
    name: "rEFInd"
    description: "A visually pleasing boot manager. Automatically detects other OSs."
    packages: [refind, efibootmgr]
